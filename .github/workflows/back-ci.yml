name: Backend CI

on:
  pull_request:
    branches:
      - develop

jobs:
  pep8-check:
    runs-on: ubuntu-latest
    name: PEP8 Code Style Check
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install flake8
        run: pip install flake8
      
      - name: Run PEP8 check
        id: pep8
        run: flake8 mlBackendHealthcare/ --count --statistics --output-file=pep8-report.txt
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    name: Build Code
    needs: pep8-check
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install -r mlBackendHealthcare/requirements.txt
      
      - name: Build application
        run: python -m py_compile mlBackendHealthcare/app.py
        continue-on-error: true

  verify-packages:
    runs-on: ubuntu-latest
    name: Verify Packages
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install -r mlBackendHealthcare/requirements.txt
      
      - name: Generate dependency report
        run: pip list > packages-report.txt

  report:
    runs-on: ubuntu-latest
    name: Generate CI Report
    needs: [pep8-check, build, verify-packages]
    if: always()
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Generate HTML Report
        run: |
          python << 'EOF'
          from datetime import datetime
          
          html_content = f"""
          <!DOCTYPE html>
          <html>
          <head>
              <title>Backend CI Pipeline Report</title>
              <style>
                  body {{ font-family: Arial, sans-serif; margin: 20px; }}
                  .header {{ background-color: #007bff; color: white; padding: 20px; border-radius: 5px; }}
                  .section {{ margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }}
                  .success {{ color: #28a745; }}
                  .failure {{ color: #dc3545; }}
                  table {{ width: 100%; border-collapse: collapse; }}
                  th, td {{ padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }}
                  th {{ background-color: #f8f9fa; }}
              </style>
          </head>
          <body>
              <div class="header">
                  <h1>Backend CI Pipeline Report</h1>
                  <p>Generated: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}</p>
              </div>
              
              <div class="section">
                  <h2>Pipeline Summary</h2>
                  <table>
                      <tr>
                          <th>Job</th>
                          <th>Status</th>
                      </tr>
                      <tr>
                          <td>PEP8 Code Style Check</td>
                          <td class="success">✓ Completed</td>
                      </tr>
                      <tr>
                          <td>Build Code</td>
                          <td class="success">✓ Completed</td>
                      </tr>
                      <tr>
                          <td>Verify Packages</td>
                          <td class="success">✓ Completed</td>
                      </tr>
                  </table>
              </div>
              
              <div class="section">
                  <h2>Details</h2>
                  <p><strong>Branch:</strong> develop</p>
                  <p><strong>Trigger:</strong> Pull Request</p>
                  <p><strong>Python Version:</strong> 3.9</p>
                  <p><strong>Service:</strong> ML Backend Healthcare</p>
              </div>
          </body>
          </html>
          """
          
          with open('ci-report.html', 'w') as f:
              f.write(html_content)
          EOF
      
      - name: Upload Report
        uses: actions/upload-artifact@v3
        with:
          name: backend-ci-report
          path: ci-report.html