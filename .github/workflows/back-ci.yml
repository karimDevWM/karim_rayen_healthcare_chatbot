name: Backend CI

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

jobs:
  pep8-check:
    runs-on: ubuntu-latest
    name: PEP8 Code Style Check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install flake8
        run: pip install flake8
      - name: Run PEP8 check
        id: pep8
        run: flake8 mlBackendHealthcare/ --count --statistics --output-file=pep8-report.txt
        continue-on-error: true
      - name: Upload PEP8 report
        uses: actions/upload-artifact@v4
        with:
          name: backend-pep8-report
          path: pep8-report.txt
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    name: Build Code
    needs: pep8-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install -r mlBackendHealthcare/requirements.txt
      - name: Build application
        run: python -m py_compile mlBackendHealthcare/app.py
        continue-on-error: true

