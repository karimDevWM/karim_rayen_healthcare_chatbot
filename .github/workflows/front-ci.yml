test:
    runs-on: ubuntu-latest
    name: Run Tests
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pytest pytest-cov -r requirements.txt
      - name: Run tests
        run: pytest tests/ --cov=src --cov-report=xml