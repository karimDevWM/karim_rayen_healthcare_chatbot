name: Frontend CI

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

jobs:
  pep8-check:
    runs-on: ubuntu-latest
    name: PEP8 Code Style Check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install flake8
        run: pip install flake8
      - name: Run PEP8 check
        id: pep8
        working-directory: karim-rayen_healthcarechatbot
        run: flake8 src/ app.py config.py --count --statistics --output-file=pep8-report.txt
        continue-on-error: true
      - name: Upload PEP8 report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-pep8-report
          path: karim-rayen_healthcarechatbot/pep8-report.txt
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    name: Build Code
    needs: pep8-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        working-directory: karim-rayen_healthcarechatbot
        run: pip install -r requirements.txt
      - name: Build application
        working-directory: karim-rayen_healthcarechatbot
        run: python -m py_compile app.py src/*.py
        continue-on-error: true

  verify-packages:
    runs-on: ubuntu-latest
    name: Verify Packages
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        working-directory: karim-rayen_healthcarechatbot
        run: pip install -r requirements.txt
      - name: Generate dependency report
        working-directory: karim-rayen_healthcarechatbot
        run: pip list > packages-report.txt
      - name: Upload packages report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-packages-report
          path: karim-rayen_healthcarechatbot/packages-report.txt
          if-no-files-found: ignore

  docker-build-push:
    runs-on: ubuntu-latest
    name: Build and Push Docker Image
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-frontend" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./karim-rayen_healthcarechatbot
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}