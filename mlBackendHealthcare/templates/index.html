<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Chatbot Médical</title>
    <style>
        .chat-window { width: 400px; height: 500px; border: 1px solid #ddd; display: flex; flex-direction: column; margin: auto; border-radius: 10px; overflow: hidden; }
        .messages { flex: 1; padding: 10px; overflow-y: auto; background: #f9f9f9; }
        .user-msg { background: #007bff; color: white; padding: 8px; margin: 5px; border-radius: 10px; align-self: flex-end; }
        .bot-msg { background: #e9e9eb; padding: 8px; margin: 5px; border-radius: 10px; align-self: flex-start; }
        .input-area { display: flex; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: none; }
        button { padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-window">
        <div class="messages" id="chatBox">
            <div class="bot-msg">Bonjour ! Comment vous sentez-vous aujourd'hui ? Décrivez-moi vos symptômes.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ex: J'ai mal au ventre et j'ai de la fièvre...">
            <button onclick="sendMessage()">Envoyer</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            if (!input.value) return;

            // Afficher le message de l'utilisateur
            chatBox.innerHTML += `<div class="user-msg">${input.value}</div>`;
            const message = input.value;
            input.value = "";

            // Appeler Flask
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();

            // Afficher la réponse du bot
            chatBox.innerHTML += `<div class="bot-msg">${data.response}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
